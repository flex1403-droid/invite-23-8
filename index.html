<title>Корпоратив 23+8</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: radial-gradient(circle at top, #1b1b2f, #0f0f18);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
}

.card {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: 40px 25px;
    text-align: center;
    color: white;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: fadeIn 1.2s ease forwards;
}

.title {
    font-size: 64px;
    font-weight: 900;
    background: linear-gradient(45deg, #ffd700, #ff9500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: float 3s ease-in-out infinite;
}

.subtitle {
    margin-top: 10px;
    font-size: 20px;
    letter-spacing: 3px;
}

.info {
    margin-top: 30px;
    font-size: 18px;
    line-height: 1.6;
}

.button {
    margin-top: 35px;
    display: inline-block;
    padding: 16px 28px;
    background: linear-gradient(45deg, #ff3b30, #ff9500);
    color: white;
    text-decoration: none;
    font-weight: 700;
    border-radius: 14px;
    transition: 0.3s;
}

.button:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 30px rgba(255,100,50,0.6);
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes float {
    0%,100% {transform: translateY(0px);}
    50% {transform: translateY(-8px);}
}
</style>
</head>
