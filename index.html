<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Open Graph для Telegram -->
    <meta property="og:title" content="🎉 Приглашение на корпоратив 23+8!">

    <title>Приглашение 23+8</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header {
            padding: 30px 20px;
            text-align: center;
            background: #fff;
        }

        .icons {
            font-size: 32px;
            margin-bottom: 20px;
            letter-spacing: 10px;
        }

        .title {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 10px;
        }

        .num-23 {
            color: #ff9500;
        }

        .plus {
            color: #666;
            font-size: 48px;
            margin: 0 5px;
            align-self: flex-start;
            margin-top: 10px;
        }

        .num-8 {
            color: #5856d6;
        }

        .subtitle {
            font-size: 20px;
            color: #333;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .badge-feb {
            background: #1c1c1e;
            color: #ffd60a;
        }

        .badge-mar {
            background: #ff2d55;
            color: #fff;
        }

        .info-section {
            padding: 20px;
            background: #f2f2f7;
            margin: 0 15px 15px;
            border-radius: 16px;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            padding: 16px 0;
            border-bottom: 1px solid #e5e5ea;
        }

        .info-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-item:first-child {
            padding-top: 0;
        }

        .info-icon-box {
            width: 44px;
            height: 44px;
            background: #5856d6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            flex-shrink: 0;
            font-size: 22px;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 12px;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .info-value {
            font-size: 18px;
            color: #000;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .info-sub {
            font-size: 14px;
            color: #666;
        }

        .button-section {
            padding: 0 20px 20px;
        }

        .map-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: #ff3b30;
            color: #fff;
            text-decoration: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(255,59,48,0.3);
        }

        .map-button:active {
            opacity: 0.9;
        }

        .finger {
            margin-left: 8px;
            font-size: 22px;
        }

        .footer {
            background: #f2f2f7;
            padding: 20px;
            text-align: center;
        }

        .code {
            font-size: 18px;
            color: #333;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .footer-text {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="icons">🎖️⚔️💐🌸</div>
            <div class="title">
                <span class="num-23">23</span>
                <span class="plus">+</span>
                <span class="num-8">8</span>
            </div>
            <div class="subtitle">КОРПОРАТИВ</div>
            <div class="badges">
                <span class="badge badge-feb">23 ФЕВРАЛЯ</span>
                <span class="badge badge-mar">8 МАРТА</span>

        <div class="info-section">

            <div class="info-item">

                <div class="info-content">

                    <div class="info-value">Лофт БЛЕКБЕРРИ</div>
                    <div class="info-sub">ул. Бакунинская, 74-76, к1</div>
                </div>
            </div>
        </div>

        <div class="button-section">
            <a href="https://yandex.ru/maps/213/moscow/?indoorLevel=1&ll=37.684867%2C55.775490&mode=routes&rtext=55.772382%2C37.678737~55.778547%2C37.691396&rtt=mt&ruri=~ymapsbm1%3A%2F%2Fgeo%3Fdata%3DCgg1NjczNjA1NBJH0KDQvtGB0YHQuNGPLCDQnNC-0YHQutCy0LAsINCR0LDQutGD0L3QuNC90YHQutCw0Y8g0YPQu9C40YbQsCwgNzQtNzbQujEiCg3-wxZCFTsdX0I%2C&z=16.53" class="map-button">
                Открыть маршрут
                <span class="finger">👆</span>
            </a>
        </div>

        <div class="footer">
            <div class="code">23-08-2026</div>
            <div class="footer-text">Ждём вас на празднике!</div>
        </div>
    </div>
</body>
</html>
